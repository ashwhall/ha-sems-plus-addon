name: SEMS+ Scraper
version: 0.1.7
slug: sems_plus_scraper
description: >-
  Scrapes the GoodWe SEMS+ portal (semsplus.goodwe.com) for solar inverter
  metrics and exposes them via a local HTTP API for Home Assistant consumption.
image: ghcr.io/ashwhall/sems-plus-scraper-{arch}
url: https://github.com/ashwhall/ha-sems-plus-addon
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: HTTP API
ingress: false
options:
  sems_username: ''
  sems_password: ''
  poll_interval_seconds: 300
  plant_id: ''
schema:
  sems_username: str
  sems_password: password
  poll_interval_seconds: 'int(60,3600)'
  plant_id: str?
